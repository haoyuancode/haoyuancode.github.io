<h3 id="反转一维数组"><a href="#反转一维数组" class="headerlink" title="反转一维数组"></a>反转一维数组</h3><figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br></pre></td><td class="code"><pre><code class="hljs java"><span class="hljs-comment">//定义数组</span><br><span class="hljs-keyword">int</span> [] arr=<span class="hljs-keyword">new</span> <span class="hljs-keyword">int</span> []&#123;<span class="hljs-number">1</span>,<span class="hljs-number">2</span>,<span class="hljs-number">3</span>,<span class="hljs-number">4</span>,<span class="hljs-number">5</span>&#125;;<br><br><span class="hljs-keyword">for</span> (<span class="hljs-keyword">int</span> i=<span class="hljs-number">0</span>;i&lt;arr.length/<span class="hljs-number">2</span>;i++)&#123;<br>    <span class="hljs-comment">//定义中转变量</span><br>    <span class="hljs-keyword">int</span> temp=arr[i];<br>    <span class="hljs-comment">//arr[arr.length-i-1]从后往前取出值</span><br>    arr[i]=arr[arr.length-i-<span class="hljs-number">1</span>];<br>    arr[arr.length-i-<span class="hljs-number">1</span>]=temp;<br>&#125;<br></code></pre></td></tr></table></figure>

<h3 id="二分法查找数组"><a href="#二分法查找数组" class="headerlink" title="二分法查找数组"></a>二分法查找数组</h3><p>前提:数组必须有序</p>
<figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br></pre></td><td class="code"><pre><code class="hljs java"><span class="hljs-comment">//二分法查找</span><br>    <span class="hljs-keyword">int</span> [] arr=<span class="hljs-keyword">new</span> <span class="hljs-keyword">int</span>[]&#123;<span class="hljs-number">55</span>,<span class="hljs-number">66</span>,<span class="hljs-number">77</span>,<span class="hljs-number">88</span>,<span class="hljs-number">89</span>,<span class="hljs-number">90</span>,<span class="hljs-number">99</span>&#125;; <span class="hljs-comment">//数组必须有序</span><br>    <span class="hljs-comment">//定义起始索引和结尾索引</span><br>    <span class="hljs-keyword">int</span> head=<span class="hljs-number">0</span>;<br>    <span class="hljs-keyword">int</span> end=arr.length-<span class="hljs-number">1</span>;<br>    <span class="hljs-keyword">int</span> findNum=<span class="hljs-number">88</span>;<span class="hljs-comment">//定义要查找的值</span><br>    <span class="hljs-keyword">while</span>(head&lt;=end)&#123;<br>        <span class="hljs-keyword">int</span> middle=(head+end)/<span class="hljs-number">2</span>;<span class="hljs-comment">//取出数组中位值</span><br>        <span class="hljs-keyword">if</span> (findNum==arr[middle])&#123;<br>            System.out.println(<span class="hljs-string">&quot;找到了,下标索引值是:&quot;</span>+middle);<br>            <span class="hljs-keyword">break</span>;<br>        &#125;<span class="hljs-keyword">else</span> <span class="hljs-keyword">if</span>(arr[middle]&gt;findNum)&#123;<span class="hljs-comment">//如果相比起来中位数大，则从中位数左边开始查找</span><br>            end=middle-<span class="hljs-number">1</span>;<span class="hljs-comment">//结束索引使用middle-1调到中位数middle前一位</span><br>        &#125;<span class="hljs-keyword">else</span> &#123;<span class="hljs-comment">//否则就从右边查找</span><br>            head=middle+<span class="hljs-number">1</span>;<span class="hljs-comment">//开始索引值从中位数middle右边开始</span><br>        &#125;<br>    &#125;<br></code></pre></td></tr></table></figure>

<h3 id="递归"><a href="#递归" class="headerlink" title="递归"></a>递归</h3><p>一个方法体内调用自身</p>
<figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br></pre></td><td class="code"><pre><code class="hljs java">求<span class="hljs-number">5</span>的阶乘<br>    <br>    main()&#123;<br>    <span class="hljs-keyword">new</span> 对象<br>        对象名.getSum(<span class="hljs-number">5</span>);<br>&#125;<br>    <span class="hljs-function"><span class="hljs-keyword">public</span> <span class="hljs-keyword">int</span> <span class="hljs-title">getSum</span><span class="hljs-params">(<span class="hljs-keyword">int</span> i)</span></span>&#123;<br>    	<span class="hljs-keyword">if</span>(i==<span class="hljs-number">1</span>)&#123;<br>            <span class="hljs-keyword">return</span> <span class="hljs-number">1</span>;<br>        &#125;<span class="hljs-keyword">else</span>&#123;<br>            <span class="hljs-keyword">return</span> i*(i-<span class="hljs-number">1</span>);<br>        &#125;<br>&#125;<br></code></pre></td></tr></table></figure>
